{% set name = "xmipy" %}
{% set version = "1.5.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/xmipy-{{ version }}.tar.gz
  sha256: 4a7991e0a81dbc0c9cf9444bf758411313d5a2157d94d6133c806f2133698bb3

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=61
    - pip
  run:
    - python >={{ python_min }}
    - bmipy
    - numpy

test:
  imports:
    - xmipy
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/Deltares/xmipy.git
  summary: xmipy is an extension to the bmipy Python package
  dev_url: https://github.com/Deltares/xmipy
  license: CC0-1.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jdhughes-usgs
    - deltares-service-account
